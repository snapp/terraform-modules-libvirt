---

dictionaryDefinitions:
  - name: Spellcheck Overrides
    path: ./cspell_dictionary.txt
    addWords: true

dictionaries:
  - overrides

words:
  - CDPATH
  - cdrom
  - checkwinsize
  - cloudinit
  - COLORTERM
  - Colour
  - Containerfile
  - diffutils
  - dmacvicar
  - ensurepip
  - gecos
  - gruntfuggly
  - HEALTHCHECK
  - histappend
  - HISTCONTROL
  - HISTFILESIZE
  - HISTSIZE
  - HISTTIMEFORMAT
  - ignoredups
  - ignorespace
  - iputils
  - libatomic
  - myuser
  - nodocs
  - procps
  - qcow
  - setopt
  - shopt
  - snapp
  - tflint
  - tfupdate
  - tfvars
  - truecolor
  - userns
  - vcpu
  - vhost
  - virtio

ignorePaths:
  - "**/.github/CODEOWNERS"
  - "**/.github/settings.yml"
  - "**/.gitignore"
  - "**/.pre-commit-config.yaml"
  - "**/cspell.config.yml"
